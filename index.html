<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All 30 NBA Fanbases Ranked - RotoGrinders</title>
    <style>
        :root {
            --rg-dark: #1a1d21;
            --rg-panel: #24282d;
            --rg-green: #27ae60;
            --rg-blue: #3498db;
            --rg-text: #ffffff;
            --rg-border: #3d434a;
        }

        body {
            background-color: var(--rg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--rg-text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--rg-panel);
            border-radius: 12px;
            border: 1px solid var(--rg-border);
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .title-block { margin-bottom: 25px; }
        h2 { margin: 0; font-size: 24px; text-transform: uppercase; color: var(--rg-green); }
        .subtitle { color: #bdc3c7; font-size: 14px; margin-top: 5px; }

        .header-row {
            display: grid;
            grid-template-columns: 50px 1fr 100px 100px 120px 140px;
            padding: 15px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            font-weight: bold;
            font-size: 11px;
            color: #95a5a6;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-row div:nth-child(2) { text-align: left; }

        .team-row {
            display: grid;
            grid-template-columns: 50px 1fr 100px 100px 120px 140px;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid var(--rg-border);
            transition: background 0.1s;
        }

        .team-row:hover { background: rgba(255,255,255,0.03); }

        .rank { font-weight: bold; font-size: 16px; color: #bdc3c7; text-align: center; }
        .rank-top { color: var(--rg-green); font-size: 18px; }

        .team-info { display: flex; align-items: center; gap: 12px; }
        .team-logo { width: 32px; height: 32px; object-fit: contain; }
        .team-names { display: flex; flex-direction: column; }
        .team-name { font-weight: bold; font-size: 14px; }
        .arena-name { font-size: 11px; color: #7f8c8d; }

        .stat { font-family: 'Roboto Mono', monospace; font-size: 13px; text-align: center; }
        .reddit-count { color: #ff4500; }
        
        .index-badge {
            background: var(--rg-blue);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            min-width: 50px;
        }
        .top-badge { background: var(--rg-green); }

        /* Small screen adjustments */
        @media (max-width: 768px) {
            .header-row, .team-row { grid-template-columns: 40px 1fr 80px 100px; }
            .header-row div:nth-child(3), .header-row div:nth-child(4),
            .team-row div:nth-child(3), .team-row div:nth-child(4) { display: none; }
        }
    </style>
</head>
<body>
